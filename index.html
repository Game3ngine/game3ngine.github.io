<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreEngine | Built by Developers</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --text-color: #f1f5f9;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        #game-container {
            position: relative;
            border: 2px solid #334155;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        canvas {
            background: #000;
            display: block;
            border-radius: 6px;
        }

        .controls {
            margin-top: 1rem;
            color: #94a3b8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>CoreEngine</h1>
        <p>Built by Developers for Developers</p>
    </header>

    <div id="game-container">
        <canvas id="engineCanvas" width="800" height="450"></canvas>
    </div>

    <div class="controls">
        <code>WASD to Move | SPACE to Action</code>
    </div>

    <script>
        const canvas = document.getElementById('engineCanvas');
        const ctx = canvas.getContext('2d');

        function drawWelcome() {
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = '20px monospace';
            ctx.fillStyle = '#38bdf8';
            ctx.fillText('> Initializing Engine...', 50, 50);
            ctx.fillText('> System Ready.', 50, 80);
        }

        drawWelcome();
    </script>
</body>
</html>
